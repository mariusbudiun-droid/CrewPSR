  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .sub {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .name {
      font-weight: 700;
      font-size: 15px;
    }

    .sub2 {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 700;
      margin-left: 8px;
    }

    .pending {
      background: #fef3c7;
      color: #92400e;
    }

    .approved {
      background: #d1fae5;
      color: #065f46;
    }

    button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-approve {
      background: #059669;
      color: white;
    }

    .btn-revoke {
      background: #dc2626;
      color: white;
    }

    .btn-refresh {
      background: #1a4fba;
      color: white;
    }

    #loginBox {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 320px;
      margin: 60px auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
  </style>

<body>

  <div id="loginBox">
    <h2 style="margin-bottom:16px;font-size:18px;">CrewPSR Admin</h2>
    <input
      type="password"
      id="adminPwd"
      placeholder="Admin password"
      onkeydown="if(event.key==='Enter') adminLogin()"
    />
    <button
      onclick="adminLogin()"
      style="width:100%;padding:12px;background:#1a4fba;color:white;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;"
    >
      Login
    </button>
    <div id="loginErr" style="color:#dc2626;font-size:13px;margin-top:8px;display:none;"></div>
  </div>

  <div id="mainContent" style="display:none;">
    <div class="topbar">
      <div>
        <h1>CrewPSR Admin</h1>
        <p class="sub" style="margin-bottom:0;">Manage user approvals</p>
      </div>
      <button class="btn-refresh" onclick="loadUsers()">Refresh</button>
    </div>
    <div id="userList"><p>Loading...</p></div>
  </div>

  <script>
    const SUPAURL = 'https://wudxxjidvajrfutgvnoa.supabase.co';
    const SUPAANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1ZHh4amlkdmFqcmZ1dGd2bm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzkwNjQsImV4cCI6MjA5MjUxNTA2NH0.HwbS7g4cjK3IV_J7bvsTLKExfnCd_qGOd_m-AcB4PMo';
    const ADMINPWD = 'Marius87';

    function adminLogin() {
      const pwd = document.getElementById('adminPwd').value;

      if (pwd !== ADMINPWD) {
        document.getElementById('loginErr').textContent = 'Wrong password';
        document.getElementById('loginErr').style.display = 'block';
        return;
      }

      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      loadUsers();
    }

    async function supa(path, opts = {}) {
      let res;

      try {
        res = await fetch(`${SUPAURL}/rest/v1/${path}`, {
          ...opts,
          headers: {
            apikey: SUPAANON,
            Authorization: `Bearer ${SUPAANON}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation',
            ...(opts.headers || {}),
          },
        });
      } catch (err) {
        throw new Error(`Network/CORS error: ${err.message}`);
      }

      if (!res.ok) {
        const errText = await res.text().catch(() => res.statusText);
        throw new Error(`Supabase ${res.status}: ${errText}`);
      }

      if (res.status === 204) return null;

      const text = await res.text().catch(() => '');
      if (!text || !text.trim()) return null;

      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error(`Invalid JSON response: ${text.slice(0, 200)}`);
      }
    }

    async function loadUsers() {
      const el = document.getElementById('userList');
      el.innerHTML = `<p>Loading...</p>`;

      try {
        const users = await supa('profiles?select=*&order=created_at.desc');

        if (!users?.length) {
          el.innerHTML = `<p style="color:#888;">No users yet.</p>`;
          return;
        }

        el.innerHTML = users.map(u => `
          <div class="card">
            <div class="row">
              <div>
                <div class="name">
                  ${u.display_name || '-'}
                  <span class="badge ${u.approved ? 'approved' : 'pending'}">
                    ${u.approved ? 'Approved' : 'Pending'}
                  </span>
                </div>
                <div class="sub2">
                  ${(u.crew_code || '-')} • Roster ${u.roster_num ?? '-'} •
                  ${u.created_at ? new Date(u.created_at).toLocaleDateString() : '-'}
                </div>
              </div>
              <div>
                ${u.approved
                  ? `<button class="btn-revoke" onclick="setApproved('${u.id}', false)">Revoke</button>`
                  : `<button class="btn-approve" onclick="setApproved('${u.id}', true)">Approve</button>`
                }
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        el.innerHTML = `<p style="color:#dc2626;">Error loading users: ${e.message}</p>`;
      }
    }

    async function setApproved(id, val) {
      const btn = event?.target;
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        const res = await fetch(`${SUPAURL}/rest/v1/profiles?id=eq.${id}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPAANON,
            'Authorization': `Bearer ${SUPAANON}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({ approved: val }),
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`${res.status}: ${err}`);
        }
        await loadUsers();
      } catch (e) {
        alert(`Update failed: ${e.message}`);
        if (btn) { btn.disabled = false; btn.textContent = val ? 'Approve' : 'Revoke'; }
      }
    }
  </script>
</body>
