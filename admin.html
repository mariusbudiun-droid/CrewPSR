<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CrewPSR Admin</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 24px; }
  .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .name { font-weight: 700; font-size: 15px; }
  .sub2 { font-size: 12px; color: #888; margin-top: 2px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 700; }
  .pending { background: #fef3c7; color: #92400e; }
  .approved { background: #d1fae5; color: #065f46; }
  button { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-approve { background: #059669; color: white; }
  .btn-revoke  { background: #dc2626; color: white; }
  #loginBox { background: white; border-radius: 12px; padding: 24px; max-width: 320px; margin: 60px auto; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; margin-bottom: 12px; }
</style>
</head>
<body>

<div id="loginBox">
  <h2 style="margin-bottom:16px;font-size:18px">CrewPSR Admin</h2>
  <input type="password" id="adminPwd" placeholder="Admin password" onkeydown="if(event.key==='Enter')adminLogin()">
  <button onclick="adminLogin()" style="width:100%;padding:12px;background:#1a4fba;color:white;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer">Login</button>
  <div id="loginErr" style="color:#dc2626;font-size:13px;margin-top:8px;display:none"></div>
</div>

<div id="mainContent" style="display:none">
  <h1>👥 CrewPSR Admin</h1>
  <p class="sub">Manage user approvals</p>
  <div id="userList"><p>Loading…</p></div>
</div>

<script>
const SUPA_URL  = 'https://abywawanxryiptcclszg.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFieXdhd2FueHJ5aXB0Y2Nsc3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODIxMzIsImV4cCI6MjA5MjM1ODEzMn0.H5xrJALFhB3omyiYZgmhG6l57N4MduNvtqxSKrQbxzg';
const ADMIN_PWD = 'crewpsr_admin_2026'; // Change this!

function adminLogin() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd !== ADMIN_PWD) {
    document.getElementById('loginErr').textContent = 'Wrong password';
    document.getElementById('loginErr').style.display = 'block';
    return;
  }
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  loadUsers();
}

async function supa(path, opts = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPA_ANON,
      'Authorization': `Bearer ${SUPA_ANON}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts.headers || {}),
    },
  });
  return res.status === 204 ? null : res.json();
}

async function loadUsers() {
  const users = await supa('profiles?select=*&order=created_at.asc');
  const el = document.getElementById('userList');
  if (!users?.length) { el.innerHTML = '<p style="color:#888">No users yet.</p>'; return; }

  el.innerHTML = users.map(u => `
    <div class="card">
      <div class="row">
        <div>
          <div class="name">${u.display_name} <span class="badge ${u.approved?'approved':'pending'}">${u.approved?'Approved':'Pending'}</span></div>
          <div class="sub2">${u.crew_code} · Roster ${u.roster_num} · ${new Date(u.created_at).toLocaleDateString()}</div>
        </div>
        ${u.approved
          ? `<button class="btn-revoke" onclick="setApproved('${u.id}', false)">Revoke</button>`
          : `<button class="btn-approve" onclick="setApproved('${u.id}', true)">Approve</button>`
        }
      </div>
    </div>`).join('');
}

async function setApproved(id, val) {
  await supa(`profiles?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ approved: val }),
  });
  loadUsers();
}
</script>
</body>
</html>
